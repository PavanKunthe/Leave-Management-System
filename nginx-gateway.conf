events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend_servers {
        server backend:8000;
    }

    upstream frontend_servers {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        # Route API requests to the backend
        location /api/ {
            proxy_pass http://backend_servers/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route documentation requests to backend
        location /docs {
            proxy_pass http://backend_servers/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend_servers/openapi.json;
            proxy_set_header Host $host;
        }

        # Route all other requests to the frontend React app
        location / {
            proxy_pass http://frontend_servers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
