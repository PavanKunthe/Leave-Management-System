server {
    listen 80;
    server_name localhost;

    # Serve React app
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # This is critical for React Router — if someone visits /employee/dashboard,
        # Nginx won't find that file, so it serves index.html and React Router handles it
        try_files $uri $uri/ /index.html;
    }

    # Forward API requests to the backend container
    # When frontend calls /api/auth/login, Nginx strips /api and sends /auth/login to backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}